<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelance Génie Logiciel</title>

    <!-- Google Fonts for modern typography -->
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="#" class="logo">
            <div class="logo-icon"></div>
            LOGOTYPE
        </a>
        <ul class="nav-links">
            <li><a href="#accueil">Accueil</a></li>
            <li><a href="#services">Services</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <!-- HERO SECTION -->
    <section id="accueil" class="hero">
        <span class="welcome">Bienvenue !</span>
        <h1>FREELANCE GÉNIE LOGICIEL</h1>
        <a href="#contact" class="btn-primary">ME CONTACTER</a>
    </section>

    <!-- SERVICES -->
    <section id="services" class="services-section">
        <h2 class="section-title">NOS SERVICES</h2>
        <div class="services-grid" id="services-container">
            <!-- Dynamic Content loaded via JS mimicking API fetch -->
        </div>
    </section>

    <!-- CONTACT SECTION -->
    <section id="contact" class="contact-section">
        <h2 class="section-title">CONTACT</h2>
        <form class="contact-form" id="contactForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="nom">Nom</label>
                    <input type="text" id="nom" required placeholder="Votre nom">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="nom@exemple.com">
                </div>
            </div>
            <div class="form-group">
                <label for="sujet">Sujet</label>
                <input type="text" id="sujet" placeholder="Objet de votre message">
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" required placeholder="Écrivez votre message ici..."></textarea>
            </div>
            <button type="submit" class="btn-primary submit-btn">ENVOYER</button>
            <div id="form-status"></div>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 Freelance Génie Logiciel. Tous droits réservés.</p>
    </footer>

    <!-- JS  -->
    <script src="script.js"></script>
</body>
</html>
